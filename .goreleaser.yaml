version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: airstats
    main: ./core
    binary: airstats
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids: [airstats]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:

changelog:
  use: github
  filters:
    exclude:
      - "^docs?:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "merge pull request"
      - "merge branch"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  make_latest: auto
